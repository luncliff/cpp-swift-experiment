#
# References
#  - https://github.com/lukka/CppBuildTasks-Validation/tree/master/.github/workflows
#  - https://roseline.oopy.io/dev/github-action-cahce
#
name: "Swift: Mac"

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build_and_test:
    runs-on: macos-latest
    env:
      VCPKG_FEATURE_FLAGS: manifests,binarycaching
    steps:
      - uses: actions/checkout@v2
      - uses: lukka/run-vcpkg@v7.3
        with:
          vcpkgArguments: "protobuf:x64-osx protobuf:arm64-osx"
          vcpkgDirectory: "/usr/local/share/vcpkg" # todo: use $VCPKG_INSTALLATION_ROOT
          vcpkgTriplet: "x64-osx"
          vcpkgGitCommitId: 1085a57da0725c19e19586025438e8c16f34c890 # 2022.01.01
          cleanAfterBuild: true
      - uses: lukka/run-cmake@v3.4
        with:
          useVcpkgToolchainFile: true
          cmakeBuildType: "Release"
          buildDirectory: "${{ github.workspace }}/build"
          buildWithCMake: true
          buildWithCMakeArgs: "--target codegen"
      - name: "Build SwiftProtobuf"
        run: swift build --target SwiftProtobuf
      - name: "Build Environment"
        run: swift build --target Environment
      - name: "Swift Build"
        run: swift build --verbose --target scone --configuration debug
      - name: "Swift Test"
        run: swift test --verbose
      - name: "Swift Build(Release)"
        run: swift build --configuration release
